name: Compile LaTeX

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: main.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.pdf
          git commit -m "Update PDF" || echo "No changes"
          git push